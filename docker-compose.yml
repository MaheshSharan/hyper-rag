version: '3.8'
services:
  opensearch:
    image: opensearchproject/opensearch:latest
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=M@hesh2028!1516
    ports:
      - 9200:9200
    ulimits:
      memlock:
        soft: -1
        hard: -1
    networks:
      - rag-net

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - 6333:6333
    networks:
      - rag-net

  neo4j:
    image: neo4j:latest
    environment:
      - NEO4J_AUTH=neo4j/password
    ports:
      - 7687:7687
      - 7474:7474
    networks:
      - rag-net

networks:
  rag-net:
    driver: bridge
